<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>多维表格 JS 引擎</title>
  <!-- Monaco Editor 样式 -->
  <link rel="stylesheet" href="vendor/monaco-editor/min/vs/editor/editor.main.css">
  <!-- xterm.js 样式 -->
  <link rel="stylesheet" href="vendor/xterm.js/css/xterm.css">
  <!-- 自定义样式 -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
      padding: 12px;
    }
    .editor-container {
      flex: 2;
      display: flex;
      flex-direction: column;
      border: 1px solid #e5e7eb;
      border-radius: 6px 6px 0 0;
      overflow: hidden;
      min-height: 100px;
    }
    .editor-header {
      padding: 8px 12px;
      background: #f3f4f6;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .editor-header h3 { font-size: 14px; font-weight: 500; }
    .editor-header .header-buttons { display: flex; gap: 8px; }
    .editor-header .header-buttons button { padding: 4px 8px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; cursor: pointer; }
    #editor { flex: 1; height: 100%; }
    .resizer {
      height: 6px;
      background: #e5e7eb;
      cursor: row-resize;
      position: relative;
    }
    .resizer:hover {
      background: #d1d5db;
    }
    .resizer::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 2px;
      background: #9ca3af;
      border-radius: 1px;
    }
    .terminal-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid #e5e7eb;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      min-height: 100px;
    }
    
    /* 确保终端内容容器有正确的滚动行为 */
    #terminal {
      flex: 1;
      height: 100%;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    /* 避免子元素 margin 溢出容器 */
    #terminal > * {
      margin: 0;
    }
    .terminal-header {
      padding: 8px 12px;
      background: #f3f4f6;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .terminal-header h3 { font-size: 14px; font-weight: 500; }
    .terminal-header .header-buttons { display: flex; gap: 8px; }
    .terminal-header .header-buttons button { padding: 4px 8px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; cursor: pointer; }
    #terminal { flex: 1; height: 100%; box-sizing: border-box; }
  </style>
</head>
<body>


<div class="container">
  <div class="editor-container">
    <div class="editor-header">
      <h3>代码编辑器</h3>
      <div class="header-buttons">
        <button id="editor-run">运行</button>
      </div>
    </div>
    <div id="editor"></div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="terminal-container">
    <div class="terminal-header">
      <h3>终端</h3>
      <div class="header-buttons">
        <button id="terminal-copy">复制</button>
        <button id="terminal-clear">清空</button>
      </div>
    </div>
    <div id="terminal"></div>
  </div>
</div>

<!-- Monaco Editor -->
<script src="vendor/monaco-editor/min/vs/loader.js"></script>
<script>
  require.config({
    paths: {
      'vs': 'vendor/monaco-editor/min/vs'
    }
  });
</script>
<!-- xterm.js -->
<script src="vendor/xterm.js/lib/xterm.js"></script>
<!-- Danfo.js -->
<script src="vendor/danfojs/lib/bundle.js"></script>

<!-- @lark-base-open/js-sdk -->
<script src="vendor/@lark-base-open/js-sdk/dist/index.js"></script>
<!-- 主脚本 -->
<script type="module" src="src/js/main.js"></script>
</body>
</html>
