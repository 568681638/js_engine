<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多维表格 JS 引擎</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      height: 100vh;
      overflow: hidden;
    }
    
    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }
    
    /* 文件树样式 */
    .file-tree {
      width: 250px;
      background-color: #ffffff;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      padding: 10px;
    }
    
    /* 编辑器和终端容器 */
    .editor-terminal {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    /* 编辑器容器 */
    .editor-container {
      flex: 2;
      background-color: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      position: relative;
    }
    
    /* 终端容器 */
    .terminal-container {
      flex: 1;
      background-color: #1e1e1e;
      position: relative;
    }
    
    /* 分隔条样式 */
    .resizer {
      width: 100%;
      height: 4px;
      background-color: #e0e0e0;
      cursor: row-resize;
    }
    
    .resizer:hover {
      background-color: #1890ff;
    }
    
    /* 编辑器和终端内部元素 */
    #editor {
      width: 100%;
      height: 100%;
    }
    
    #terminal {
      width: 100%;
      height: 100%;
    }
    
    /* 按钮样式 */
    button {
      padding: 4px 8px;
      font-size: 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    
    button:hover {
      background: #f3f4f6;
    }
  </style>
  <!-- 引入 @wannacode/code-editor-sdk 样式 -->
  <link rel="stylesheet" href="vendor/@wannacode/code-editor-sdk/src/index.css">
  <!-- 引入 Danfo.js -->
  <script src="vendor/danfojs/lib/bundle.js"></script>
  <!-- 引入 React 和 React DOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- 引入 Monaco Editor -->
  <script src="vendor/monaco-editor/dev/vs/loader.js"></script>
  <script>
    require.config({
      paths: {
        'vs': 'vendor/monaco-editor/dev/vs'
      }
    });
  </script>
</head>
<body>
  <div class="container">
    <!-- 文件树 -->
    <div class="file-tree" id="file-tree"></div>
    
    <!-- 编辑器和终端 -->
    <div class="editor-terminal">
      <!-- 编辑器 -->
      <div class="editor-container">
        <div id="editor"></div>
        <button id="editor-run" style="position: absolute; top: 10px; right: 10px;">运行</button>
      </div>
      
      <!-- 可拖动分隔条 -->
      <div class="resizer" id="resizer"></div>
      
      <!-- 终端 -->
      <div class="terminal-container">
        <div id="terminal"></div>
        <div style="position: absolute; top: 10px; right: 10px; display: flex; gap: 8px;">
          <button id="terminal-copy">复制</button>
          <button id="terminal-clear">清空</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 引入 @wannacode/code-editor-sdk -->
  <script type="module" src="vendor/@wannacode/code-editor-sdk/src/CodeEditorSDK/index.js"></script>
  <!-- 引入主脚本 -->
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
